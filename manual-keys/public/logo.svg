<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 768">
  <!-- Background circle -->
  <circle cx="384" cy="320" r="280" fill="#c8e6c9" stroke="#2d5016" stroke-width="8"/>
  
  <!-- Keyboard body -->
  <g>
    <!-- Main keyboard outline -->
    <rect x="130" y="120" width="520" height="280" rx="30" fill="#4caf50" stroke="#2d5016" stroke-width="6"/>
    
    <!-- Keyboard inner -->
    <rect x="140" y="130" width="500" height="260" rx="25" fill="#81c784" stroke="#2d5016" stroke-width="4"/>
    
    <!-- Top row -->
    <g id="top-row">
      <rect x="160" y="150" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <rect x="205" y="150" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <rect x="250" y="150" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <rect x="295" y="150" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <rect x="340" y="150" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <rect x="385" y="150" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <rect x="430" y="150" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <rect x="475" y="150" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <rect x="530" y="150" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <rect x="575" y="150" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
    </g>
    
    <!-- Second row with letters W E R Y U I P -->
    <g id="second-row">
      <rect x="160" y="195" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="177.5" y="220" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">W</text>
      
      <rect x="205" y="195" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="222.5" y="220" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">E</text>
      
      <rect x="250" y="195" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="267.5" y="220" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">R</text>
      
      <rect x="295" y="195" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="312.5" y="220" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">Y</text>
      
      <rect x="340" y="195" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="357.5" y="220" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">U</text>
      
      <rect x="385" y="195" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="402.5" y="220" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">I</text>
      
      <rect x="430" y="195" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="447.5" y="220" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">P</text>
      
      <rect x="530" y="195" width="80" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
    </g>
    
    <!-- Third row with letters A S D F G K L -->
    <g id="third-row">
      <rect x="160" y="240" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="177.5" y="265" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">A</text>
      
      <rect x="205" y="240" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="222.5" y="265" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">S</text>
      
      <rect x="250" y="240" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="267.5" y="265" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">D</text>
      
      <rect x="295" y="240" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="312.5" y="265" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">F</text>
      
      <rect x="340" y="240" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="357.5" y="265" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">G</text>
      
      <rect x="385" y="240" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="402.5" y="265" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">K</text>
      
      <rect x="430" y="240" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="447.5" y="265" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">L</text>
      
      <rect x="530" y="240" width="80" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
    </g>
    
    <!-- Fourth row with letters Z X C V B N -->
    <g id="fourth-row">
      <rect x="160" y="285" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="177.5" y="310" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">Z</text>
      
      <rect x="205" y="285" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="222.5" y="310" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">X</text>
      
      <rect x="250" y="285" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="267.5" y="310" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">C</text>
      
      <rect x="295" y="285" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="312.5" y="310" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">V</text>
      
      <rect x="340" y="285" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="357.5" y="310" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">B</text>
      
      <rect x="385" y="285" width="35" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
      <text x="402.5" y="310" font-family="Arial" font-size="18" font-weight="bold" fill="#2d5016" text-anchor="middle">N</text>
      
      <rect x="530" y="285" width="80" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
    </g>
    
    <!-- Spacebar area with nature elements -->
    <rect x="160" y="330" width="450" height="35" rx="3" fill="#a5d6a7" stroke="#2d5016" stroke-width="2"/>
    <!-- Small nature doodles on spacebar -->
    <path d="M 280 350 Q 285 345 290 350" stroke="#2d5016" stroke-width="2" fill="none"/>
    <path d="M 310 350 Q 315 345 320 350" stroke="#2d5016" stroke-width="2" fill="none"/>
    <circle cx="340" cy="348" r="2" fill="#2d5016"/>
    <circle cx="345" cy="347" r="2" fill="#2d5016"/>
    <circle cx="350" cy="348" r="2" fill="#2d5016"/>
  </g>
  
  <!-- Right side circular element -->
  <circle cx="600" cy="200" r="25" fill="#81c784" stroke="#2d5016" stroke-width="4"/>
  
  <!-- Cable -->
  <path d="M 200 400 Q 250 420 300 410" stroke="#2d5016" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>